<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobiles Pi Store - تأمين واختبار الدفع</title>
    <script src="https://sdk.mine.pi/pi-sdk.js"></script>
    <style>
        body { 
            background-color: #6700eb; 
            color: white; 
            text-align: center; 
            font-family: Arial, sans-serif; 
            padding: 50px 20px;
            margin: 0;
        }
        .loader { 
            border: 5px solid #f3f3f3; 
            border-top: 5px solid #ffcc00; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            animation: spin 2s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-text { font-size: 1.2rem; margin-top: 20px; }
        .payment-box {
            display: none; /* مخفي حتى تكتمل المصادقة */
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
            border: 1px solid #ffcc00;
        }
        button {
            background-color: #ffcc00;
            color: #6700eb;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>مرحباً بك في سوق الهواتف الآمن</h1>
    <div id="loading-section">
        <div class="loader"></div>
        <p id="status" class="status-text">جاري تأمين اتصالك بشبكة باي...</p>
    </div>

    <div id="payment-section" class="payment-box">
        <h3>اختبار الدفع التجريبي (Testnet)</h3>
        <p>لإتمام إعداد تطبيقك، يرجى إجراء معاملة تجريبية بقيمة 1 Pi</p>
        <button id="pay-button">إجراء معاملة تجريبية الآن</button>
    </div>

    <script>
        // ملاحظة: تم ضبط sandbox على true لأغراض الاختبار (Testnet)
        Pi.init({ version: "2.0", sandbox: true });

        async function authenticateUser() {
            const statusElement = document.getElementById('status');
            const paymentSection = document.getElementById('payment-section');
            const loadingSection = document.getElementById('loading-section');
            
            try {
                // 1. المصادقة
                const auth = await Pi.authenticate(['username', 'payments', 'wallet_address'], onIncompletePaymentFound);
                console.log("Authenticated User: ", auth.user.username);
                
                statusElement.innerText = "تم التحقق بنجاح!";
                
                // 2. إظهار قسم الدفع لإجراء المعاملة التجريبية
                loadingSection.style.display = "none";
                paymentSection.style.display = "block";

            } catch (err) {
                statusElement.innerText = "يرجى فتح الموقع من داخل تطبيق Pi Browser للمتابعة.";
                console.error(err);
            }
        }

        // 3. دالة إجراء المعاملة (التي ستحقق لك شرط Process a Transaction)
        document.getElementById('pay-button').onclick = async function() {
            try {
                const payment = await Pi.createPayment({
                    amount: 1.0,
                    memo: "اختبار دفع تجريبي - متجر هواتف باي",
                    metadata: { orderId: "test_order_101" },
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        console.log("بانتظار موافقة الخادم. المعرف:", paymentId);
                        // في هذه المرحلة البسيطة، ستحتاج للموافقة يدوياً من Developer Portal أو إعداد خادم لاحقاً
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("نجحت المعاملة! رقم العملية: " + txid);
                        // بعد النجاح، يمكنك توجيه المستخدم لمتجر Carrd
                        window.location.href = "https://mobiles-pi-store.carrd.com/?auth=success";
                    },
                    onCancel: (paymentId) => { alert("تم إلغاء المعاملة."); },
                    onError: (error, payment) => { alert("خطأ في الدفع: " + error.message); },
                });
            } catch (err) {
                console.error("Payment Error:", err);
            }
        };

        function onIncompletePaymentFound(payment) {
            console.log("Incomplete payment found", payment);
        };

        window.onload = authenticateUser;
    </script>
</body>
</html>
