<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobiles Pi Store - تأمين الاتصال</title>
    <script src="https://sdk.mine.pi/pi-sdk.js"></script>
    <style>
        body { 
            background-color: #6700eb; 
            color: white; 
            text-align: center; 
            font-family: Arial, sans-serif; 
            padding-top: 100px;
            margin: 0;
        }
        .loader { 
            border: 5px solid #f3f3f3; 
            border-top: 5px solid #ffcc00; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            animation: spin 2s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-text { font-size: 1.2rem; margin-top: 20px; padding: 0 20px; }
    </style>
</head>
<body>

    <h1>مرحباً بك في سوق الهواتف الآمن</h1>
    <div class="loader"></div>
    <p id="status" class="status-text">جاري تأمين اتصالك بشبكة باي...</p>

    <script>
        // دالة بدء المصادقة والتحويل
        async function authenticateAndRedirect() {
            const statusElement = document.getElementById('status');
            
            try {
                // 1. تهيئة المكتبة
                await Pi.init({ version: "2.0", sandbox: false });

                // 2. طلب المصادقة
                const auth = await Pi.authenticate(['username', 'payments', 'wallet_address'], onIncompletePaymentFound);
                
                // 3. عرض رسالة النجاح
                statusElement.innerText = "تم التحقق بنجاح! جاري نقلك للمتجر...";
                
                // 4. التحويل التلقائي إلى Carrd (النفق)
                setTimeout(() => {
                    window.location.href = "https://mobiles-pi-store.carrd.com/?auth=success";
                }, 1000);

            } catch (err) {
                // في حال وجود خطأ أو فتح الموقع خارج Pi Browser
                statusElement.innerText = "يرجى فتح الموقع من داخل تطبيق Pi Browser للمتابعة.";
                console.error("Pi SDK Error:", err);
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("Incomplete payment found", payment);
        };

        // تشغيل الوظيفة فور تحميل الصفحة
        window.onload = authenticateAndRedirect;
    </script>
</body>
</html>
