<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Mobiles Pi Store - جارٍ التحقق</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background-color: #6700eb; color: white; text-align: center; font-family: Arial; padding-top: 100px; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #ffcc00; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>مرحباً بك في سوق الهواتف الآمن</h1>
    <div class="loader"></div>
    <p id="status">جاري تأمين اتصالك بشبكة باي...</p>

    <script>
        // 1. تشغيل الأداة
        Pi.init({ version: "2.0", sandbox: true });

        async function startApp() {
            try {
                // 2. طلب المصادقة
                const auth = await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
                
                // 3. إذا نجح الربط، نرسله فوراً إلى Carrd
                document.getElementById('status').innerText = "تم التحقق! جاري نقلك للمتجر...";
                window.location.href = "https://mobiles-pi-store.carrd.co/";
                
            } catch (err) {
                document.getElementById('status').innerText = "يرجى فتح الموقع من داخل Pi Browser للمتابعة.";
            }
        }

        function onIncompletePaymentFound(payment) { /* للتعامل مع المدفوعات لاحقاً */ }

        window.onload = startApp;
    </script>
</body>
</html>
